version: "3.9"

services:
  bff:
    image: rodynaamrfathygouda/bff:latest
    ports:
      - "8003:8000"
    depends_on:
      - navigation
      - positioning
      - redis
    env_file:
      
  navigation:
    image: rodynaamrfathygouda/navigation-api:latest
    container_name: navigation-container
    ports:
      - "8000:8000"
    env_file:
      - navigation.env

  positioning:
    image: rodynaamrfathygouda/positioning-api:latest
    container_name: positioning-container
    ports:
      - "8001:8000"
    env_file:
      - positioning.env

  redis:
    image: redis:7
    ports:
      - "6379:6379"

network:
  default:
    name: bff-network
